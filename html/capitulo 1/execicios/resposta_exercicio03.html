<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Grade Horária de Aulas do Módulo</title>
</head>
<body>

    <!-- MÓDULO 5: HORÁRIOS DAS AULAS -->
    <div class="bloco-cronograma">
        <h2 class="titulo-seccao">Horários acadêmicos</h2>

        <table border="1">
            <caption>HORÁRIO DA AULA</caption>

            <thead>
                <tr>
                    <th scope="col">Aula</th>
                    <th scope="col">Horário</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>Estruturação Multimídia</td>
                    <td>19:00 - 20:30</td>
                </tr>
            </tbody>
        </table>

        <p>Recursos necessários:</p>

        <ul>
            <li>Computador com IDE configurada</li>
            <li>Arquivos de legenda (.vtt) prontos</li>
        </ul>
    </div>

    <hr>

    <!-- MÓDULO 6: CONTEÚDO INTEGRADO -->
    <div class="bloco-video">

        <h2>Apresentação da Disciplina</h2>

        <video controls>
            <source src="apresentacao.mp4" type="video/mp4">

            <track
                kind="captions"
                src="legenda.vtt"
                srclang="pt"
                label="Português"
                default>
        </video>

    </div>

    <iframe
        src="https://mapas.iff.edu.br"
        title="Localização do Campus IFF"
        sandbox="allow-scripts allow-same-origin"
        loading="lazy">
    </iframe>

</body>
</html>
