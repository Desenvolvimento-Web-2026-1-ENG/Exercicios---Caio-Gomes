<!DOCTYPE html>
    <html lang="pt-BR">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corrigindo</title>
</head>

<body>

    <header>
        <h1>Área de Contato do Cliente</h1>
        <nav>
            <ul>
                <li><a href="#">Ajuda</a></li>
                <li><a href="/html/index.html">Sair</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Envie sua mensagem para a nossa equipe de suporte backend</h2>

            <fieldset>

                <form action="/enviar" method="GET">

                    <label id="nome">Nome:</label>
                    <br>
                    <input type="text" name="nome"><br><br>

                    <label id="email"> Email:</label>
                    <br>
                    <input type="text" name="email"><br><br>

                    <label id="celular">Celular:</label>
                    <br>
                    <input type="text" name="celular"><br><br>

                    <label id="msg"> Mensagem:</label>
                    <br>
                    <textarea name="msg"></textarea><br><br>

                    <button type="submit" value="Disparar Dados" > Enviar Mensagem </button>
                </form>

            </fieldset>
        </section>

    </main>
    <footer>
        <p>Suporte Tech 2026</p>
    </footer>
</body>

</html>
